# 🌐 Nginx Konfiguration für Production
# Erstelle diese Datei auf dem Server: /etc/nginx/sites-available/gastro-cms
# Dann: ln -s /etc/nginx/sites-available/gastro-cms /etc/nginx/sites-enabled/

# CRM (crm.gastro-cms.at) - CRM System
server {
    listen 80;
    server_name crm.gastro-cms.at;
    
    # Max upload size: 5MB
    client_max_body_size 5M;
    
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Timeout for large uploads
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# Landing Page (www.gastro-cms.at / gastro-cms.at) - Hauptdomain
server {
    listen 80;
    server_name www.gastro-cms.at gastro-cms.at;
    
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Multi-Tenant (Wildcard - alle anderen Subdomains)
server {
    listen 80;
    server_name *.gastro-cms.at;
    
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

