events {}

http {
  # DNS resolver für Docker internal DNS
  resolver 127.0.0.11 valid=10s;
  resolver_timeout 5s;

  # SSL-Konfiguration
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security Headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  # HTTP zu HTTPS Redirect für CRM
  server {
    listen 80;
    server_name crm.gastro-cms.at;
    return 301 https://$server_name$request_uri;
  }

  # HTTPS für CRM
  server {
    listen 443 ssl http2;
    server_name crm.gastro-cms.at;

    ssl_certificate /etc/letsencrypt/live/crm.gastro-cms.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.gastro-cms.at/privkey.pem;

    # Max upload size: 5MB
    client_max_body_size 5M;

    location / {
      proxy_pass http://crm:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_cache_bypass $http_upgrade;
      # Timeout for large uploads
      proxy_read_timeout 300s;
      proxy_connect_timeout 300s;
      proxy_send_timeout 300s;
    }
  }

  # HTTP zu HTTPS Redirect für Landing Page
  server {
    listen 80;
    server_name www.gastro-cms.at gastro-cms.at;
    return 301 https://www.gastro-cms.at$request_uri;
  }

  # HTTPS für Landing Page
  server {
    listen 443 ssl http2;
    server_name www.gastro-cms.at gastro-cms.at;

    ssl_certificate /etc/letsencrypt/live/www.gastro-cms.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.gastro-cms.at/privkey.pem;

    location / {
      proxy_pass http://root:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_cache_bypass $http_upgrade;
    }
  }

  # HTTP für Multi-Tenant (Wildcard - kann kein SSL haben ohne Wildcard-Zertifikat)
  server {
    listen 80;
    server_name *.gastro-cms.at;

    location / {
      proxy_pass http://multi:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_cache_bypass $http_upgrade;
    }
  }

  # Fallback: alle anderen Hosts zur Multi-App (für individuelle Restaurant-Domains)
  server {
    listen 80 default_server;
    server_name _;
    location / {
      proxy_pass http://multi:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_cache_bypass $http_upgrade;
    }
  }
}

