events {}

http {
  # DNS resolver für Docker internal DNS
  resolver 127.0.0.11 valid=10s;
  resolver_timeout 5s;

  server {
    listen 80;
    server_name www.gastro-cms.local gastro-cms.local gastro-cms.at;

    location / {
      proxy_pass http://root:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_cache_bypass $http_upgrade;
    }
  }

  server {
    listen 80;
    server_name crm.gastro.local crm.gastro-cms.local;

    # Max upload size: 5MB
    client_max_body_size 5M;

    location / {
      proxy_pass http://crm:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_cache_bypass $http_upgrade;
      # Timeout for large uploads
      proxy_read_timeout 300s;
      proxy_connect_timeout 300s;
      proxy_send_timeout 300s;
    }
  }

  server {
    listen 80;
    server_name pizzeria1140.local;

    location / {
      proxy_pass http://multi:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_cache_bypass $http_upgrade;
    }
  }

  # Fallback: alle anderen Hosts zur Multi-App
  server {
    listen 80 default_server;
    server_name _;
    location / {
      proxy_pass http://multi:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_cache_bypass $http_upgrade;
    }
  }
}

