# Nginx Konfiguration für www.gastro-cms.at
# Diese Datei sollte nach /etc/nginx/sites-available/gastro-cms-at kopiert werden
# und dann mit ln -s /etc/nginx/sites-available/gastro-cms-at /etc/nginx/sites-enabled/ verlinkt werden

server {
    listen 80;
    listen [::]:80;
    server_name www.gastro-cms.at gastro-cms.at;

    # Redirect HTTP to HTTPS
    return 301 https://www.gastro-cms.at$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.gastro-cms.at gastro-cms.at;

    # SSL-Zertifikate (Let's Encrypt)
    # Diese müssen mit certbot erstellt werden:
    # certbot --nginx -d www.gastro-cms.at -d gastro-cms.at
    ssl_certificate /etc/letsencrypt/live/www.gastro-cms.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.gastro-cms.at/privkey.pem;
    
    # SSL-Konfiguration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'" always;

    # Logs
    access_log /var/log/nginx/gastro-cms-at-access.log;
    error_log /var/log/nginx/gastro-cms-at-error.log;

    # Max upload size
    client_max_body_size 10M;

    # Proxy zu Next.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files caching
    location /_next/static {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }

    # Favicon und andere statische Dateien
    location ~* \.(ico|css|js|gif|jpe?g|png|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

